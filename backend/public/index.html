<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Covenant Odyssey - Theme Preview</title>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    /* Reset & Base Styling */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: radial-gradient(circle at center, #171721 0%, #0A0A0C 100%);
      color: #FFFFFF;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background Ambient Glow */
    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, rgba(0,0,0,0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      pointer-events: none;
    }

    /* Theme Image Container */
    .image-container {
      z-index: 2;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .theme-image {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 0;
      border: 4px solid #3F3F54;
      box-shadow: 15px 15px 0px rgba(0, 0, 0, 1);
    }

    @keyframes goldGlowPulse {
      0% {
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.3), 15px 15px 0px rgba(0, 0, 0, 1);
        border-color: #3F3F54;
      }
      50% {
        box-shadow: 0 0 35px rgba(212, 175, 55, 0.7), 15px 15px 0px rgba(0, 0, 0, 1);
        border-color: #D4AF37;
      }
      100% {
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.3), 15px 15px 0px rgba(0, 0, 0, 1);
        border-color: #3F3F54;
      }
    }

    @keyframes panelGlowPulse {
      0% {
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.3), 8px 8px 0px rgba(0, 0, 0, 1);
        border-color: #FF3333;
      }
      50% {
        box-shadow: 0 0 25px rgba(212, 175, 55, 0.6), 8px 8px 0px rgba(0, 0, 0, 1);
        border-color: #D4AF37;
      }
      100% {
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.3), 8px 8px 0px rgba(0, 0, 0, 1);
        border-color: #FF3333;
      }
    }

    .theme-image:hover {
      transform: translate(-2px, -2px);
      animation: goldGlowPulse 2s infinite ease-in-out;
    }

    /* Brutalist Solid Overlay Panel */
    .overlay-panel {
      position: absolute;
      bottom: 40px;
      z-index: 3;
      background: #111115;
      padding: 16px 28px;
      border-radius: 0;
      border: 3px solid #FF3333;
      box-shadow: 8px 8px 0px rgba(0, 0, 0, 1);
      text-align: center;
      animation: fadeInUp 0.5s ease-out;
      transition: border-color 0.3s ease;
    }

    .overlay-panel:hover {
      animation: panelGlowPulse 2s infinite ease-in-out;
    }

    .overlay-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .overlay-sub {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #FF3333;
      margin-top: 6px;
      letter-spacing: 2px;
    }

    /* Keyframes */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="glow"></div>

  <div class="image-container">
    <img src="Kingdoms-and-Prophets-Theme.png" alt="Kingdoms and Prophets Theme Artwork" class="theme-image">
  </div>

  <div class="overlay-panel">
    <div class="overlay-title">Kingdoms & Prophets Theme</div>
    <div class="overlay-sub">Covenant Odyssey &bull; Generative Chapter Art</div>
  </div>

</body>
</html>
