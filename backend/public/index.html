<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Covenant Odyssey - Theme Preview</title>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    /* Reset & Base Styling */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: radial-gradient(circle at center, #171721 0%, #0A0A0C 100%);
      color: #FFFFFF;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background Ambient Glow */
    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, rgba(0,0,0,0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      pointer-events: none;
    }

    /* Theme Image Container */
    .image-container {
      z-index: 2;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .theme-image {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 
                  0 0 40px rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: transform 0.5s ease, box-shadow 0.5s ease;
    }

    .theme-image:hover {
      transform: scale(1.01);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9), 
                  0 0 50px rgba(212, 175, 55, 0.2);
    }

    /* Stylized Glassmorphic Overlay Panel */
    .overlay-panel {
      position: absolute;
      bottom: 40px;
      z-index: 3;
      background: rgba(23, 23, 33, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 16px 28px;
      border-radius: 50px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: fadeInUp 1s ease-out;
    }

    .overlay-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: #D4AF37;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .overlay-sub {
      font-size: 0.85rem;
      color: #A0A0B0;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* Keyframes */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="glow"></div>

  <div class="image-container">
    <img src="Kingdoms-and-Prophets-Theme.png" alt="Kingdoms and Prophets Theme Artwork" class="theme-image">
  </div>

  <div class="overlay-panel">
    <div class="overlay-title">Kingdoms & Prophets Theme</div>
    <div class="overlay-sub">Covenant Odyssey &bull; Generative Chapter Art</div>
  </div>

</body>
</html>
